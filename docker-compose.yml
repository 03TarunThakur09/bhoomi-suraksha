# ══════════════════════════════════════════════════════════════
# Bhoomi Suraksha — Docker Compose
# Run both services locally: docker compose up --build
# ══════════════════════════════════════════════════════════════

services:
  # ── Backend (FastAPI) ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bhoomi-backend
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - DATABASE_URL=sqlite+aiosqlite:///./propverify.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-dev-key}
      - UPLOAD_DIR=/app/uploads
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/google_cred.json
    volumes:
      - uploads_data:/app/uploads
      - ./google_cred.json:/app/secrets/google_cred.json:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend (Next.js) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    container_name: bhoomi-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads_data:
