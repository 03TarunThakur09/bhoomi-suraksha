# ══════════════════════════════════════════════════════════════
# Bhoomi Suraksha — CI/CD Pipeline
# Triggers on push to main → Build Docker → Push to GCP → Deploy to Cloud Run
# ══════════════════════════════════════════════════════════════

name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_REGION: asia-south1
  BACKEND_IMAGE: bhoomi-backend
  FRONTEND_IMAGE: bhoomi-frontend

jobs:
  # ── Job 1: Build & Push Backend ─────────────────────────────
  build-backend:
    name: 🔧 Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          PROJECT=$(echo "${{ secrets.GCP_PROJECT_ID }}" | tr -d '[:space:]')
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT}/bhoomi/${{ env.BACKEND_IMAGE }}"
          docker build -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" -f Dockerfile .
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Push to Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "${{ env.IMAGE }}:${{ github.sha }}"
          docker push "${{ env.IMAGE }}:latest"

      - name: Deploy to Cloud Run
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          gcloud run deploy ${{ env.BACKEND_IMAGE }} \
            --image "${{ env.IMAGE }}:${{ github.sha }}" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --port 8080 \
            --allow-unauthenticated \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" \
            --set-env-vars "APP_ENV=production" \
            --set-env-vars "APP_DEBUG=false" \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi

  # ── Job 2: Build & Push Frontend ────────────────────────────
  build-frontend:
    name: 🎨 Build Frontend
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Backend URL
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: backend-url
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_IMAGE }} --region ${{ env.GCP_REGION }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          PROJECT=$(echo "${{ secrets.GCP_PROJECT_ID }}" | tr -d '[:space:]')
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT}/bhoomi/${{ env.FRONTEND_IMAGE }}"
          API_URL="${{ steps.backend-url.outputs.url }}"
          API_URL="${API_URL:-http://localhost:8080}"
          docker build --build-arg NEXT_PUBLIC_API_URL="${API_URL}" -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" -f frontend/Dockerfile frontend/
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Push to Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "${{ env.IMAGE }}:${{ github.sha }}"
          docker push "${{ env.IMAGE }}:latest"

      - name: Deploy to Cloud Run
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          gcloud run deploy ${{ env.FRONTEND_IMAGE }} \
            --image "${{ env.IMAGE }}:${{ github.sha }}" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --port 3000 \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 3 \
            --memory 256Mi
